<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Access Denied</title>
    <style>
        /* General Styles */
        body {
            font-family: "72", Arial, sans-serif; /* SAP Fiori standard font */
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
            color: #333333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        /* Header and Text */
        h1 {
            font-size: 2.5rem;
            color: #d9534f; /* SAP standard red for error */
            margin-bottom: 10px;
        }
        p {
            font-size: 1.2rem;
            color: #5a5a5a;
            margin: 5px 0;
        }

        /* Button Style */
        .action-btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #007bff; /* SAP standard blue for buttons */
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            transition: background-color 0.3s;
        }
        .action-btn:hover {
            background-color: #0056b3; /* Darker blue on hover */
        }

        /* Footer */
        footer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #9e9e9e;
        }
    </style>
</head>
<body>
<!-- Error Message -->
<h1>Access Denied</h1>
<p>Sorry, you don’t have the necessary permissions to access this page.</p>
<p>If you think this is an error, please contact your system administrator.</p>

<!-- Action Buttons -->
<a class="action-btn" th:href="@{/}">Return to Home</a>
<a class="action-btn" th:href="@{/support}">Contact Support</a>

<!-- Footer -->
<footer>© 2024 SAP SE or an SAP affiliate company. All rights reserved.</footer>
</body>
</html>
